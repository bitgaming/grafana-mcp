nameOverride: "grafana-mcp"
fullnameOverride: "grafana-mcp"

namespace: monitoring

replicaCount: 2

image:
  repository: europe-docker.pkg.dev/sports-dev-experiments/eu/mcp/grafana
  tag: "latest" # override during build with commit SHA
  pullPolicy: Always

# DO NOT set CPU limits, it will do more harm than help
resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

autoscaling:
  enabled: true
  targetKind: Deployment
  minReplicas: 2
  maxReplicas: 4
  targetCPUAverageValue: 40m
  targetMemoryAverageValue: 100Mi

service:
  type: ClusterIP
  annotations:
    cloud.google.com/backend-config: '{"default": "public-cloud-armor-backendconfig-monitoring"}'
    cloud.google.com/neg: '{"ingress": true}'
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http

container:
  ports:
    - name: http
      containerPort: 8000
      protocol: TCP

probesV2:
  liveness:
    httpGet:
      path: /healthz
      port: http
    periodSeconds: 10
    timeoutSeconds: 3
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 2
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 5
  startup:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 30

antiAffinity: "soft"

serviceAccount:
  create: true
